<!DOCTYPE html>
<html>
<script type="module" src="dest/App.js" defer></script>
<script type="module" src="dest/mouse-tracking.js" defer></script>
<script type="module" src="dest/Settings.js" defer></script>
<link rel="stylesheet" href="src/App.css">
<body>
    
    <div class="round-finalization">
        <p id="score-display"></p>
        <p id="score-breakdown"></p>
        <button id="next-round-button">Next</button>
    </div>
    
    <div id="settings-gear">⚙</div>

    <dialog id="mark-skin-dialog">
        <h2>Choose Mark Skin</h2>
        <div class="mark-skin-grid">
            <img class="mark-skin-option" src="./Images/Markers/(Icon)_Place_Mark.png" />
            <img class="mark-skin-option" src="./Images/Markers/(Icon)_Fire.png" />
            <img class="mark-skin-option" src="./Images/Markers/(Icon)_Ice.png" />
            <img class="mark-skin-option" src="./Images/Markers/(Icon)_Storm.png" />
            <img class="mark-skin-option" src="./Images/Markers/(Icon)_Life.png" />
            <img class="mark-skin-option" src="./Images/Markers/(Icon)_Myth.png" />
            <img class="mark-skin-option" src="./Images/Markers/(Icon)_Death.png" />
            <img class="mark-skin-option" src="./Images/Markers/(Icon)_Balance.png" />
            <img class="mark-skin-option" src="./Images/Markers/(Icon)_Sun.png" />
            <img class="mark-skin-option" src="./Images/Markers/(Icon)_Moon.png" />
            <img class="mark-skin-option" src="./Images/Markers/(Icon)_Star.png" />
            <img class="mark-skin-option" src="./Images/Markers/(Icon)_Shadow.png" />
            <img class="mark-skin-option" src="./Images/Markers/(Icon)_Hat.png" />
            <img class="mark-skin-option" src="./Images/Markers/(Icon)_Mouth_Options_Male.png" />
            <img class="mark-skin-option" src="./Images/Markers/(Icon)_Mouth_Options_Female.png" />
        </div>
        <button id="mark-skin-dialog-close-button">Close</button>
    </dialog>

    <dialog id="settings-dialog">
        <img id="mark-skin-button" src="./Images/Markers/(Icon)_Place_Mark.png" />

        <div class="slidecontainer">
            <label for="zoom-slider">Zoom Speed</label>
            <input id="zoom-slider" type="range" min="0.01" max="0.2" value="0.05" step="0.01" class="slider">
        </div>

        <details id="arc-selection">
            <summary>Arcs Selected (Currently does nothing)</summary>
            <div class="arc-options">
                <label><input type="checkbox" id="arc1-checkbox" checked /> Arc 1 (Wizard City - Dragonspyre)</label>
                <label><input type="checkbox" id="sidearc-checkbox" checked /> Side Arc (Grizzleheim, Wysteria)</label>
                <label><input type="checkbox" id="arc2-checkbox" checked /> Arc 2 (Celestia - Khrysalis)</label>
                <label class="arc-disabled"><input type="checkbox" id="arc3-checkbox" disabled /> Arc 3 (Polaris - Empyrea)</label>
            </div>
        </details>

        <h2>Settings</h2>
        <button id="settings-close-button">Close</button>
    </dialog>

    <!-- <h1 id="title">Wizard101 GeoGuessr</h1> -->
    <img id="guess-image" src="" />

    <p id="img-difficulty"></p>
    <div class="difficulty-bar">
        <div class="difficulty-bar-fill"></div>
    </div>

    <div id="Wizard101GeoGuessrMap">
        <!-- <button id="debug-boarder-button">Debug World</button> -->
        <div id="Spiral"></div>
        <button id="submit-guess-button">Place your Mark!</button>
    </div>




</body>

</html>
